(function(){
  var reduced = matchMedia(&quot;(prefers-reduced-motion: reduce)&quot;).matches;

  var DATA = {

      diag: [[&quot;策略 · 两平台分治&quot;,&quot;视频号按中老年男性盘定制（怀旧/纪录/稳重口吻）；抖音走年轻对阵/赛果节奏；快手垂直喂标签、双段重做钩子。&quot;,&quot;g&quot;],

    douyin: { health: 58, glab: &quot;平台健康分 · 抖音&quot;, formula: &quot;粉丝 1,054 · 7日 +10&quot;,
      left: [[&quot;粉丝&quot;,&quot;1,054&quot;],[&quot;7日播放&quot;,&quot;77,900&quot;],[&quot;7日投稿&quot;,&quot;17 条&quot;]],
      right: [[&quot;5s完播率&quot;,&quot;40.43%&quot;],[&quot;2s跳出率&quot;,&quot;35.45%&quot;,&quot;warn&quot;],[&quot;互动指数&quot;,&quot;0.39%&quot;,&quot;bad&quot;]],
      dlab: &quot;7日播放 · 抖音&quot;, digits: &quot;77900&quot;, dsub: &quot;净增 &lt;b&gt;+10&lt;/b&gt; · 条均时长 9.34s&quot;,
      diag: [[&quot;根因&quot;,&quot;获客款拿不到流量（43 播），涨的全是泛球迷；72% 泛娱乐受众与「中小企业老板」目标错配。&quot;,&quot;&quot;],
             [&quot;杠杆&quot;,&quot;年轻节奏对阵/赛果款 + 题材轮换；用「老板/AI获客/降本」垂直词纠偏受众。&quot;,&quot;g&quot;]] },
    shipinhao: { health: 45, glab: &quot;平台健康分 · 视频号&quot;, formula: &quot;关注 1,921 · 7日 +591&quot;,
      left: [[&quot;关注者&quot;,&quot;1,921&quot;],[&quot;7日播放&quot;,&quot;180,818&quot;],[&quot;7日赞/评&quot;,&quot;762/934&quot;]],

      left: [[&quot;粉丝&quot;,&quot;33&quot;],[&quot;7日播放&quot;,&quot;5,325&quot;],[&quot;7日投稿&quot;,&quot;4 条&quot;]],
      right: [[&quot;播放分位&quot;,&quot;82 分位&quot;,&quot;gd&quot;],[&quot;算法推荐占比&quot;,&quot;98.7%&quot;],[&quot;完播率&quot;,&quot;11%&quot;,&quot;bad&quot;]],

  };

  var needle = $(&quot;#needleG&quot;), gVal = $(&quot;#gVal&quot;), gLab = $(&quot;#gLab&quot;), gFormula = $(&quot;#gFormula&quot;),
      stackL = $(&quot;#stackL&quot;), stackR = $(&quot;#stackR&quot;), boxes = $(&quot;#boxes&quot;), dLab = $(&quot;#dLab&quot;), dSub = $(&quot;#dSub&quot;),
      diagBox = $(&quot;#diagBox&quot;), zone = $(&quot;#zone&quot;),
      tabs = Array.prototype.slice.call(document.querySelectorAll(&quot;.tab&quot;));
  var current = null, timer = null;

  function el(tag, cls, html){ var e = document.createElement(tag); if(cls) e.className = cls; if(html != null) e.innerHTML = html; return e; }

    var n = parseInt(String(final).replace(/[^\d]/g,&quot;&quot;),10);
    if (reduced || !n || n &lt; 30){ target.textContent = final; return; }

    }
    requestAnimationFrame(step);
  }

  function card(c){
    var box = el(&quot;div&quot;,&quot;scard&quot;), l = el(&quot;span&quot;,&quot;sl&quot;,c[0]), v = el(&quot;span&quot;,&quot;sv&quot;+(c[2]?&quot; &quot;+c[2]:&quot;&quot;),c[1]);
    box.appendChild(l); box.appendChild(v);
    return box;
  }

    var d = DATA[key];
    needle.style.transform = &quot;rotate(&quot; + (-90 + d.health*1.8) + &quot;deg)&quot;;

      row.appendChild(k); row.appendChild(p);
      return row;
    }));
  }

  function select(key){
    if(key === current) return;
    current = key;
    tabs.forEach(function(t){ t.setAttribute(&quot;aria-selected&quot;, String(t.dataset.p === key)); });
    zone.classList.add(&quot;loading&quot;);
    clearTimeout(timer);
    timer = setTimeout(function(){ render(key); zone.classList.remove(&quot;loading&quot;); }, reduced ? 0 : 240);
  }
  tabs.forEach(function(t){ t.addEventListener(&quot;click&quot;, function(){ select(t.dataset.p); }); });

  select(&quot;overview&quot;);
})();

      &lt;div class=&quot;ck&quot;&gt;&lt;span class=&quot;ico&quot;&gt;×&lt;/span&gt;&lt;div&gt;&lt;div class=&quot;ct&quot;&gt;CTA 假设证伪&lt;/div&gt;&lt;div class=&quot;cv&quot;&gt;11 条实测&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;p&gt;「扣队名」强二元 CTA 催评论假设已被证伪（均评论 0.7）——继续沿用＝用错误结论连发，需小样本测新机制。&lt;/p&gt;

      &lt;div class=&quot;ck&quot;&gt;&lt;span class=&quot;ico&quot;&gt;↯&lt;/span&gt;&lt;div&gt;&lt;div class=&quot;ct&quot;&gt;账号定位漂移&lt;/div&gt;&lt;div class=&quot;cv&quot;&gt;商业目标零进展&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;p&gt;连发 11 条世界杯、0 条获客，账号正变成泛体育号；唯一获客款被边缘化（播放中位 135）。&lt;/p&gt;

      &lt;p&gt;回插获客款验证退潮留存；前 1 秒抛反差结论，CTA 改&lt;b&gt;「敢不敢预测比分 / 这判罚冤不冤」&lt;/b&gt;。&lt;/p&gt;
